    <script>
        // Comprehensive Base44 API blocking
        (function() {
            'use strict';
            
            // Block fetch API calls to Base44
            if (window.fetch) {
                const originalFetch = window.fetch;
                window.fetch = function(url, options) {
                    if (typeof url === 'string' && (url.includes('base44') || url.includes('app.base44.com'))) {
                        console.log('Blocked Base44 fetch call:', url);
                        return Promise.reject(new Error('Base44 API blocked'));
                    }
                    return originalFetch.call(this, url, options);
                };
            }
            
            // Block XMLHttpRequest calls to Base44
            const originalXHR = window.XMLHttpRequest;
            window.XMLHttpRequest = function() {
                const xhr = new originalXHR();
                const originalOpen = xhr.open;
                xhr.open = function(method, url, async, user, password) {
                    if (typeof url === 'string' && (url.includes('base44') || url.includes('app.base44.com'))) {
                        console.log('Blocked Base44 XHR call:', url);
                        throw new Error('Base44 API blocked');
                    }
                    return originalOpen.call(this, method, url, async, user, password);
                };
                return xhr;
            };
            
            // Block WebSocket connections to Base44
            const originalWebSocket = window.WebSocket;
            window.WebSocket = function(url, protocols) {
                if (typeof url === 'string' && (url.includes('base44') || url.includes('app.base44.com'))) {
                    console.log('Blocked Base44 WebSocket:', url);
                    throw new Error('Base44 WebSocket blocked');
                }
                return new originalWebSocket(url, protocols);
            };
            
            // Override any potential Base44 configuration
            window.base44 = {
                config: {},
                api: function() { return Promise.reject(new Error('Base44 API disabled')); },
                connect: function() { return Promise.reject(new Error('Base44 connection disabled')); }
            };
            
            // Block any attempts to set Base44 URLs
            Object.defineProperty(window, 'base44Url', {
                get: function() { return null; },
                set: function() { console.log('Base44 URL blocked'); }
            });
            
        })();
        
        // Additional protection after DOM loads
        document.addEventListener('DOMContentLoaded', function() {
            // Block any remaining Base44 calls
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.type === 'childList') {
                        mutation.addedNodes.forEach(function(node) {
                            if (node.nodeType === 1) { // Element node
                                const scripts = node.querySelectorAll ? node.querySelectorAll('script') : [];
                                scripts.forEach(function(script) {
                                    if (script.src && script.src.includes('base44')) {
                                        script.remove();
                                        console.log('Removed Base44 script:', script.src);
                                    }
                                });
                            }
                        });
                    }
                });
            });
            
            observer.observe(document.body, {
                childList: true,
                subtree: true
            });
        });
